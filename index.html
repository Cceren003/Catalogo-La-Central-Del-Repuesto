<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Central del Repuesto — Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo: #C0392B;
    --rojo-osc: #922B21;
    --rojo-claro: #FADBD8;
    --negro: #0D0D0D;
    --gris-osc: #1C1C1E;
    --gris-med: #3A3A3C;
    --gris-clar: #F2F2F7;
    --blanco: #FFFFFF;
    --acento: #E74C3C;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--negro);
    color: var(--blanco);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--negro);
    border-bottom: 2px solid var(--rojo);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: var(--rojo);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: white;
    letter-spacing: -1px;
  }

  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.5px;
    line-height: 1.1;
  }

  .logo-text span { color: var(--rojo); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge-total {
    background: var(--gris-med);
    color: #999;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .badge-total strong { color: white; }

  /* HERO STRIP */
  .hero-strip {
    background: linear-gradient(135deg, var(--rojo-osc) 0%, var(--rojo) 50%, #E74C3C 100%);
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
  }

  .hero-strip::before {
    content: 'CR';
    position: absolute;
    right: -20px;
    top: -30px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 160px;
    font-weight: 800;
    color: rgba(255,255,255,0.07);
    line-height: 1;
    pointer-events: none;
  }

  .hero-strip h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .hero-strip p {
    font-size: 14px;
    opacity: 0.85;
    font-weight: 300;
  }

  /* FILTROS */
  .filtros {
    background: var(--gris-osc);
    padding: 16px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-box input {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 14px 10px 38px;
    color: white;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box input::placeholder { color: rgba(255,255,255,0.35); }
  .search-box input:focus { border-color: var(--rojo); }

  .search-box .ico {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    font-size: 16px;
  }

  select {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 10px 14px;
    color: white;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 130px;
  }

  select option { background: #2C2C2E; color: white; }

  .btn-limpiar {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 16px;
    color: rgba(255,255,255,0.6);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-limpiar:hover { border-color: var(--rojo); color: var(--rojo); }

  /* TABS CATEGORÍAS */
  .tabs {
    background: var(--gris-osc);
    padding: 0 24px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 12px 16px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .tab:hover { color: rgba(255,255,255,0.8); }
  .tab.activo { color: var(--rojo); border-bottom-color: var(--rojo); }

  /* GRID PRODUCTOS */
  .contenido {
    padding: 20px 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .resultados-info {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 16px;
    font-weight: 300;
  }

  .resultados-info strong { color: rgba(255,255,255,0.8); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--gris-osc);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
    animation: fadeIn 0.3s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(192,57,43,0.5);
    box-shadow: 0 8px 32px rgba(192,57,43,0.15);
  }

  .card-img {
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, #1C1C1E, #2C2C2E);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-img-placeholder {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 48px;
    font-weight: 800;
    color: rgba(255,255,255,0.06);
    letter-spacing: -2px;
  }

  .cat-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--rojo);
    color: white;
    font-size: 10px;
    font-weight: 600;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
  }

  .proveedor-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    font-weight: 600;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.15);
  }

  .card-body { padding: 14px 16px; }

  .card-sku {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    color: var(--rojo);
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .card-nombre {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 8px;
    color: white;
  }

  .card-moto {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }

  .precio {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
  }

  .precio small {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    font-weight: 400;
    margin-left: 2px;
  }

  .btn-wa {
    background: #25D366;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s, transform 0.1s;
    text-decoration: none;
  }

  .btn-wa:hover { background: #1DA851; transform: scale(1.03); }

  /* STOCK INDICATOR */
  .stock-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    margin-right: 5px;
  }

  .stock-ok { background: #2ECC71; }
  .stock-low { background: #F39C12; }
  .stock-no { background: #E74C3C; }

  .stock-label {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--gris-osc);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    background: linear-gradient(135deg, var(--rojo-osc), var(--rojo));
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-radius: 16px 16px 0 0;
  }

  .modal-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
  }

  .modal-header .sku-tag {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
  }

  .modal-close {
    background: rgba(0,0,0,0.3);
    border: none;
    color: white;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-left: 12px;
    transition: background 0.2s;
  }

  .modal-close:hover { background: rgba(0,0,0,0.6); }

  .modal-body { padding: 24px; }

  .modal-seccion {
    margin-bottom: 20px;
  }

  .modal-seccion h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rojo);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .modal-campo {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .modal-campo label {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    display: block;
    margin-bottom: 3px;
  }

  .modal-campo span {
    font-size: 14px;
    color: white;
    font-weight: 500;
  }

  .modal-campo.full { grid-column: 1 / -1; }

  .modal-precio-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .precio-card {
    flex: 1;
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }

  .precio-card label {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
  }

  .precio-card .val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: white;
  }

  .wa-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin: 16px 0 10px;
    font-weight: 600;
  }

  .wa-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }

  .btn-wa-contacto {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(37,211,102,0.1);
    border: 1px solid rgba(37,211,102,0.25);
    border-radius: 10px;
    padding: 10px 12px;
    color: white;
    text-decoration: none;
    transition: all 0.2s;
    cursor: pointer;
  }

  .btn-wa-contacto:hover {
    background: rgba(37,211,102,0.2);
    border-color: rgba(37,211,102,0.5);
    transform: translateY(-1px);
  }

  .wa-ico {
    width: 32px;
    height: 32px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .wa-info { flex: 1; min-width: 0; }

  .wa-nombre {
    font-size: 13px;
    font-weight: 600;
    color: white;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .wa-cargo {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
  }

  @media (max-width: 480px) {
    .wa-grid { grid-template-columns: 1fr; }
  }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 16px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--rojo);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading p {
    color: rgba(255,255,255,0.4);
    font-size: 14px;
  }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: rgba(255,255,255,0.3);
  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty p { font-size: 15px; }

  /* FOOTER */
  footer {
    background: var(--gris-osc);
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 20px 24px;
    text-align: center;
    margin-top: 40px;
  }

  footer p {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
  }

  footer strong { color: var(--rojo); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .hero-strip h1 { font-size: 22px; }
    .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .card-body { padding: 10px 12px; }
    .card-nombre { font-size: 13px; }
    .precio { font-size: 18px; }
    .modal-grid { grid-template-columns: 1fr; }
    .modal-precio-row { flex-direction: column; }
    header { padding: 0 16px; }
    .filtros { padding: 12px 16px; }
    .contenido { padding: 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-icon">CR</div>
    <div class="logo-text">LA <span>CENTRAL</span><br>DEL REPUESTO</div>
  </div>
  <div class="header-right">
    <div class="badge-total">
      <strong id="cnt-total">—</strong> productos
    </div>
  </div>
</header>

<!-- HERO -->
<div class="hero-strip">
  <h1>Catálogo de Productos</h1>
  <p>Repuestos · Aceites · Llantas · Baterías · Accesorios — Multimarca</p>
</div>

<!-- FILTROS -->
<div class="filtros">
  <div class="search-box">
    <span class="ico">🔍</span>
    <input type="text" id="buscar" placeholder="Buscar por nombre, SKU, marca de moto...">
  </div>
  <select id="filtro-proveedor">
    <option value="">Todos los proveedores</option>
    <option>VINI</option>
    <option>NRP</option>
    <option>MEK</option>
    <option>Propio</option>
  </select>
  <select id="filtro-moto">
    <option value="">Todas las marcas moto</option>
  </select>
  <button class="btn-limpiar" onclick="limpiarFiltros()">✕ Limpiar</button>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
  <div class="tab activo" data-cat="">Todos</div>
</div>

<!-- CONTENIDO -->
<div class="contenido">
  <div class="resultados-info" id="info-resultados"></div>
  <div id="grid-productos" class="grid">
    <div class="loading" style="grid-column:1/-1">
      <div class="spinner"></div>
      <p>Cargando catálogo...</p>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p><strong>La Central del Repuesto</strong> · Catálogo Digital · Todos los precios en USD</p>
</footer>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="cerrarModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modal-header">
      <div>
        <h2 id="modal-nombre"></h2>
        <div class="sku-tag" id="modal-sku"></div>
      </div>
      <button class="modal-close" onclick="cerrarModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTIuZqxkOvbaT_VXd_rQ7ATJVh21nzhcu9XeQdfJ5P55ZtTcT2xp9kPS5hjimhFQ/pub?output=csv';
const CONTACTOS = [
  { nombre: 'Sala de Ventas',    cargo: 'Atención general',  num: '50370301941' },
  { nombre: 'Asesor 1',         cargo: 'Asesor de ventas',  num: '50379301485' },
  { nombre: 'Asesor 2',         cargo: 'Asesor de ventas',  num: '50376796918' },
  { nombre: 'Centro de Servicio', cargo: 'Soporte técnico', num: '50368680177' },
];

let todos = [];
let filtrados = [];
let catActiva = '';

// Parsear CSV robusto
function parseCSV(txt) {
  const lineas = txt.trim().split('\n');
  if (lineas.length < 2) return [];
  const headers = parseFila(lineas[0]);
  return lineas.slice(1).map(l => {
    const vals = parseFila(l);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(p => p['SKU'] && p['Nombre del Producto']);
}

function parseFila(linea) {
  const res = []; let cur = ''; let dentro = false;
  for (let i = 0; i < linea.length; i++) {
    const c = linea[i];
    if (c === '"') { dentro = !dentro; continue; }
    if (c === ',' && !dentro) { res.push(cur); cur = ''; continue; }
    cur += c;
  }
  res.push(cur);
  return res;
}

// Cargar datos
async function cargar() {
  try {
    const r = await fetch(CSV_URL);
    const txt = await r.text();
    todos = parseCSV(txt);
    inicializar();
  } catch(e) {
    document.getElementById('grid-productos').innerHTML = `
      <div class="empty" style="grid-column:1/-1">
        <div class="empty-icon">⚠️</div>
        <p>Error al cargar el catálogo.<br>Verifica la conexión o el enlace del Sheets.</p>
      </div>`;
  }
}

function inicializar() {
  document.getElementById('cnt-total').textContent = todos.length;
  construirTabs();
  construirFiltroMoto();
  filtrar();
}

function construirTabs() {
  const cats = [...new Set(todos.map(p => p['Categoría']).filter(Boolean))].sort();
  const cont = document.getElementById('tabs');
  cats.forEach(cat => {
    const d = document.createElement('div');
    d.className = 'tab';
    d.dataset.cat = cat;
    d.textContent = cat;
    d.onclick = () => seleccionarTab(d, cat);
    cont.appendChild(d);
  });
}

function construirFiltroMoto() {
  const motas = new Set();
  todos.forEach(p => {
    (p['Marca Moto'] || '').split('/').forEach(m => {
      const t = m.trim();
      if (t && t.toLowerCase() !== 'todas las marcas' && t.toLowerCase() !== 'universal') motas.add(t);
    });
  });
  const sel = document.getElementById('filtro-moto');
  [...motas].sort().forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    sel.appendChild(o);
  });
}

function seleccionarTab(el, cat) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('activo'));
  el.classList.add('activo');
  catActiva = cat;
  filtrar();
}

function filtrar() {
  const busq    = document.getElementById('buscar').value.toLowerCase();
  const prov    = document.getElementById('filtro-proveedor').value;
  const moto    = document.getElementById('filtro-moto').value;

  filtrados = todos.filter(p => {
    if (catActiva && p['Categoría'] !== catActiva) return false;
    if (prov && p['Proveedor'] !== prov) return false;
    if (moto && !(p['Marca Moto'] || '').includes(moto)) return false;
    if (busq) {
      const haystack = [p['Nombre del Producto'], p['SKU'], p['Marca Moto'],
                        p['Modelo Moto'], p['Marca Producto'], p['Categoría']].join(' ').toLowerCase();
      if (!haystack.includes(busq)) return false;
    }
    return true;
  });

  renderizar();
}

function renderizar() {
  const grid = document.getElementById('grid-productos');
  const info = document.getElementById('info-resultados');

  info.innerHTML = `Mostrando <strong>${filtrados.length}</strong> de <strong>${todos.length}</strong> productos`;

  if (filtrados.length === 0) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <div class="empty-icon">🔍</div>
      <p>No se encontraron productos con estos filtros.</p>
    </div>`;
    return;
  }

  grid.innerHTML = filtrados.map((p, i) => {
    const precio = parseFloat(p['Precio Venta ($)']) || 0;
    const stock  = parseInt(p['Stock']) || 0;
    const stockDot   = stock > 10 ? 'stock-ok' : stock > 0 ? 'stock-low' : 'stock-no';
    const stockTxt   = stock > 10 ? 'En stock' : stock > 0 ? `Solo ${stock} uds.` : 'Agotado';
    const cat    = p['Categoría'] || '';
    const prov   = p['Proveedor'] || '';
    const initials = cat.substring(0,2).toUpperCase();

    return `<div class="card" style="animation-delay:${i*0.03}s" onclick="abrirModal(${todos.indexOf(p)})">
      <div class="card-img">
        <div class="card-img-placeholder">${initials}</div>
        ${cat ? `<span class="cat-badge">${cat}</span>` : ''}
        ${prov ? `<span class="proveedor-badge">${prov}</span>` : ''}
      </div>
      <div class="card-body">
        <div class="card-sku">${p['SKU'] || ''}</div>
        <div class="card-nombre">${p['Nombre del Producto'] || ''}</div>
        <div class="card-moto">${p['Marca Moto'] ? '🏍 ' + p['Marca Moto'].substring(0,45) : ''}</div>
        <div class="card-footer">
          <div>
            <div class="precio">$${precio.toFixed(2)}<small>USD</small></div>
            <div class="stock-label"><span class="stock-dot ${stockDot}"></span>${stockTxt}</div>
          </div>
          <a class="btn-wa" href="https://wa.me/50370301941?text=${encodeURIComponent('Hola! Me interesa: '+p['Nombre del Producto']+' (SKU: '+p['SKU']+'). ¿Tienen disponibilidad?')}" target="_blank" onclick="event.stopPropagation()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.852L0 24l6.318-1.508A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.782 9.782 0 01-5.002-1.371l-.36-.214-3.735.893.924-3.647-.235-.374A9.77 9.77 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>
            Cotizar
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function waLink(p) {
  const msg = encodeURIComponent(
    `Hola La Central del Repuesto! 👋\nMe interesa el producto:\n\n*${p['Nombre del Producto']}*\nSKU: ${p['SKU']}\nPrecio: $${p['Precio Venta ($)']} USD\n\n¿Tienen disponibilidad?`
  );
  return `https://wa.me/${WA_NUM}?text=${msg}`;
}

function abrirModal(idx) {
  const p = todos[idx];
  const precio = parseFloat(p['Precio Venta ($)']) || 0;
  const dist   = parseFloat(p['Precio Dist. ($)']) || 0;
  const stock  = parseInt(p['Stock']) || 0;

  document.getElementById('modal-nombre').textContent = p['Nombre del Producto'] || '';
  document.getElementById('modal-sku').textContent    = `SKU: ${p['SKU'] || '—'}  ·  ${p['Categoría'] || ''}  ·  ${p['Proveedor'] || ''}`;

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-precio-row">
      <div class="precio-card">
        <label>Precio Público</label>
        <div class="val">$${precio.toFixed(2)}</div>
      </div>
      ${dist > 0 ? `<div class="precio-card">
        <label>Precio Dist.</label>
        <div class="val">$${dist.toFixed(2)}</div>
      </div>` : ''}
      <div class="precio-card">
        <label>Stock</label>
        <div class="val">${stock}</div>
      </div>
    </div>

    <div class="modal-seccion">
      <h3>Especificaciones</h3>
      <div class="modal-grid">
        ${campo('Marca', p['Marca Producto'])}
        ${campo('Material', p['Material'])}
        ${campo('Medida / Talla', p['Medida / Talla'])}
        ${campo('Peso', p['Peso (kg)'] ? p['Peso (kg)'] + ' kg' : '')}
        ${campo('Color / Acabado', p['Color / Acabado'])}
        ${campo('Variantes', p['Variantes'], true)}
        ${campo('Descripción', p['Descripción Técnica'], true)}
      </div>
    </div>

    <div class="modal-seccion">
      <h3>Compatibilidad</h3>
      <div class="modal-grid">
        ${campo('Marca de moto', p['Marca Moto'], true)}
        ${campo('Modelo(s)', p['Modelo Moto'], true)}
        ${campo('Año inicio', p['Año Inicio'])}
        ${campo('Año fin', p['Año Fin'])}
      </div>
    </div>

    <div class="modal-seccion">
      <h3>Logística</h3>
      <div class="modal-grid">
        ${campo('Código bodega', p['Código Bodega'])}
        ${campo('Proveedor', p['Proveedor'])}
        ${campo('Cód. proveedor', p['Cód. Proveedor'])}
        ${p['Observaciones'] ? campo('Observaciones', p['Observaciones'], true) : ''}
      </div>
    </div>

    <div class="wa-titulo">Contactar por WhatsApp</div>
    <div class="wa-grid">
      ${CONTACTOS.map(c => `
        <a class="btn-wa-contacto" href="https://wa.me/${c.num}?text=${encodeURIComponent('Hola La Central del Repuesto! 👋\nMe interesa el producto:\n\n*'+p['Nombre del Producto']+'*\nSKU: '+p['SKU']+'\nPrecio: $'+p['Precio Venta ($)']+' USD\n\n¿Tienen disponibilidad?')}" target="_blank">
          <div class="wa-ico">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.852L0 24l6.318-1.508A11.946 11.946 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.782 9.782 0 01-5.002-1.371l-.36-.214-3.735.893.924-3.647-.235-.374A9.77 9.77 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182c5.43 0 9.818 4.388 9.818 9.818 0 5.43-4.388 9.818-9.818 9.818z"/></svg>
          </div>
          <div class="wa-info">
            <div class="wa-nombre">${c.nombre}</div>
            <div class="wa-cargo">${c.cargo}</div>
          </div>
        </a>`).join('')}
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

function campo(lbl, val, full=false) {
  if (!val) return '';
  return `<div class="modal-campo${full?' full':''}">
    <label>${lbl}</label>
    <span>${val}</span>
  </div>`;
}

function cerrarModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function limpiarFiltros() {
  document.getElementById('buscar').value = '';
  document.getElementById('filtro-proveedor').value = '';
  document.getElementById('filtro-moto').value = '';
  catActiva = '';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('activo', i===0));
  filtrar();
}

// Event listeners
document.getElementById('buscar').addEventListener('input', filtrar);
document.getElementById('filtro-proveedor').addEventListener('change', filtrar);
document.getElementById('filtro-moto').addEventListener('change', filtrar);
document.addEventListener('keydown', e => { if(e.key==='Escape') cerrarModal(); });

// Arrancar
cargar();
</script>
</body>
</html>

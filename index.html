<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Central del Repuesto — Catálogo</title>
  <meta name="description" content="Catálogo profesional de repuestos para motos. Envíos a todo El Salvador.">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=34">
  <link rel="stylesheet" href="css/components.css?v=47">
</head>
<body>

<!-- ═══════════════════════════════════════════
     NAVBAR
     ═══════════════════════════════════════════ -->
<header class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-brand" aria-label="La Central del Repuesto">
      <img src="assets/logo-dark.png?v=2" alt="La Central del Repuesto" class="logo-global"
           onerror="this.replaceWith(Object.assign(document.createElement('span'),{innerHTML:'LA <span class=&quot;red&quot;>CENTRAL</span> DEL REPUESTO'}))">
    </a>

    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input id="searchInput" type="search" placeholder="Buscar por nombre, código o marca…" autocomplete="off">
    </div>

    <div class="nav-actions">
      <a class="cart-btn" href="cotizacion.html" title="Ver carrito / generar cotización">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
        </svg>
        <span>Carrito</span>
        <span class="cart-count zero" id="cartCount">0</span>
      </a>
      <button class="btn btn-primary" id="loginBtn">Iniciar sesión</button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════
     HERO
     ═══════════════════════════════════════════ -->
<section class="hero">
  <div class="hero-inner">
    <div>
      <h1 class="hero-title">REPUESTOS PARA<span class="red">TU MOTO</span></h1>
      <div class="hero-brands">
        <span class="brand">HONDA</span>·<span class="brand">FREEDOM</span>·<span class="brand">AKT</span>·<span class="brand">TVS</span>·<span class="brand">DAYUN</span>·<span class="brand">HERO</span>·<span class="brand">KATANA</span>·<span class="brand">SERPENTO</span>·<span class="brand">BAJAJ</span>·<span class="brand">YAMAHA</span>·<span class="brand">SUZUKI</span>·<span class="brand">UM</span>
      </div>
    </div>

    <div class="hero-compat">
      <h3>BUSCAR COMPATIBILIDAD</h3>
      <select class="select-field" id="compatMarca">
        <option value="">Selecciona la marca</option>
      </select>
      <select class="select-field" id="compatModelo" disabled>
        <option value="">Modelo de moto</option>
      </select>
      <select class="select-field" id="compatAnio" disabled>
        <option value="">Año</option>
      </select>
      <button class="btn btn-primary" id="compatBtn">Ver piezas compatibles</button>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════
     CATEGORY PILLS
     ═══════════════════════════════════════════ -->
<nav class="cat-pills-wrap">
  <button class="cat-pills-arrow left" id="catPillsLeft" type="button" aria-label="Desplazar a la izquierda">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="cat-pills" id="catPills"></div>
  <button class="cat-pills-arrow right" id="catPillsRight" type="button" aria-label="Desplazar a la derecha">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</nav>

<!-- ═══════════════════════════════════════════
     MAIN LAYOUT
     ═══════════════════════════════════════════ -->
<main class="main">
  <!-- Filters sidebar -->
  <aside class="filters">
    <h4>FILTRAR</h4>

    <div class="filter-block">
      <div class="filter-label">Marca del repuesto</div>
      <div class="chip-group" id="filterMarcaRepuesto"></div>
    </div>

    <div class="filter-block">
      <div class="filter-label">Disponibilidad</div>
      <div class="chip-group" id="filterStock"></div>
    </div>
  </aside>

  <!-- Product grid -->
  <section>
    <div class="products-header">
      <div class="products-count"><strong id="totalCount">0</strong> productos encontrados</div>
      <select class="sort-field" id="sortBy">
        <option value="relevance">Más relevantes</option>
        <option value="price-asc">Precio: menor a mayor</option>
        <option value="price-desc">Precio: mayor a menor</option>
        <option value="alpha">Alfabético (A → Z)</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- Cart panel -->
  <aside class="cart-panel">
    <h4>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/>
      </svg>
      MI CARRITO
    </h4>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-total-row">
      <span>Total</span>
      <span class="amount" id="cartTotal">$0.00</span>
    </div>
    <div class="cart-actions">
      <a class="btn btn-primary block" href="cotizacion.html">Generar cotización PDF</a>
      <button class="btn btn-wa block" id="cartWaBtn">Enviar pedido por WhatsApp</button>
      <button class="btn btn-neutral block" id="cartClearBtn">Vaciar carrito</button>
    </div>
  </aside>
</main>

<!-- ═══════════════════════════════════════════
     DETAIL MODAL
     ═══════════════════════════════════════════ -->
<div class="modal-overlay detail" id="detailOverlay">
  <div class="modal-detail">
    <button class="modal-close" id="detailClose" aria-label="Cerrar">×</button>
    <div class="detail-img" id="detailImg"></div>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-extras" id="detailExtras"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     LOGIN MODAL
     ═══════════════════════════════════════════ -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="modal-close" id="loginClose" aria-label="Cerrar">×</button>
    <img src="assets/logo-dark.png?v=2" alt="La Central del Repuesto" class="logo-global lg"
         onerror="this.style.display='none'">
    <h2>ACCESO</h2>
    <form id="loginForm">
      <div class="pw-wrap">
        <input class="input-field" id="loginPass" type="password" placeholder="Contraseña" autocomplete="current-password" required>
        <button type="button" class="pw-toggle" id="loginPassToggle" aria-label="Mostrar contraseña">
          <svg class="pw-eye pw-eye-open" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg class="pw-eye pw-eye-off" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/>
            <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/>
            <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/>
            <path d="m2 2 20 20"/>
          </svg>
        </button>
      </div>
      <div class="form-error" id="loginError"></div>
      <button class="btn btn-primary block" type="submit">Entrar</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:12px;color:var(--lcr-muted);">
      ¿No tenés acceso? <a href="https://wa.me/50370301941?text=Hola%2C%20quiero%20solicitar%20acceso%20al%20cat%C3%A1logo" target="_blank" style="color:var(--lcr-red-light);">Solicitar por WhatsApp</a>
    </p>
  </div>
</div>

<!-- Scroll top -->
<button class="scroll-top" id="scrollTop" aria-label="Subir">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M18 15l-6-6-6 6"/>
  </svg>
</button>

<!-- Scripts (v3 — cache bust) -->
<script src="js/auth.js?v=36"></script>
<script src="js/carrito.js?v=35"></script>
<script src="js/catalogo.js?v=50"></script>

</body>
</html>
